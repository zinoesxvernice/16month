<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Happy 16 Monthsary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Nunito:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Nunito', sans-serif;
      color: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── STAR BG CANVAS ── */
    #starCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── HERO ── */
    #hero {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 32px);
      transition: opacity 0.5s ease;
    }

    .glass-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: clamp(18px, 5vw, 34px);
      padding: clamp(30px, 7vw, 56px) clamp(26px, 7vw, 64px);
      max-width: min(540px, 92vw);
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 50px rgba(140,80,255,0.2),
        0 0 100px rgba(60,100,255,0.1),
        inset 0 1px 0 rgba(255,255,255,0.1);
      animation: cardIn 1.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(28px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .emoji-glow {
      font-size: clamp(1.9rem, 6vw, 2.8rem);
      display: block;
      margin-bottom: 10px;
      animation: hpulse 2.8s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(240,150,210,0.7));
    }
    @keyframes hpulse {
      0%,100% { transform:scale(1);   }
      50%      { transform:scale(1.14); }
    }

    .eyebrow {
      font-size: clamp(0.6rem, 1.8vw, 0.75rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(190,150,255,0.65);
      margin-bottom: 7px;
      animation: fadeUp 1s 0.3s both;
    }

    .main-title {
      font-family: 'Abril Fatface', cursive;
      font-size: clamp(2.4rem, 8.5vw, 4.1rem);
      line-height: 1.08;
      background: linear-gradient(135deg,#fff 0%,#dbb8ff 40%,#80b8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 9px;
      animation: fadeUp 1s 0.45s both;
    }

    .tagline {
      font-size: clamp(0.85rem, 2.4vw, 1.05rem);
      font-style: italic;
      font-weight: 300;
      color: rgba(215,195,255,0.72);
      margin-bottom: 20px;
      animation: fadeUp 1s 0.6s both;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 18px;
      animation: fadeUp 1s 0.7s both;
    }
    .divider-line {
      flex:1; max-width:65px; height:1px;
      background: linear-gradient(to right, transparent, rgba(170,130,255,0.4));
    }
    .divider-line:last-child {
      background: linear-gradient(to left, transparent, rgba(170,130,255,0.4));
    }

    .message {
      font-size: clamp(0.85rem, 2.2vw, 0.98rem);
      font-weight: 300;
      line-height: 1.85;
      color: rgba(222,210,255,0.76);
      animation: fadeUp 1s 0.85s both;
    }
    .message strong { font-weight:600; color:#ccaaff; }

    .day-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      padding: 8px 18px;
      background: rgba(130,70,255,0.14);
      border: 1px solid rgba(170,110,255,0.28);
      border-radius: 100px;
      font-size: clamp(0.72rem, 1.9vw, 0.82rem);
      font-weight: 600;
      color: #bfa0ff;
      animation: fadeUp 1s 1s both;
    }

    .click-hint {
      margin-top: 22px;
      font-size: clamp(0.65rem, 1.8vw, 0.76rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      animation: fadeUp 1s 1.3s both, breathe 3s 2.3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity:.28; }
      50%      { opacity:.65; }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(13px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── WORMHOLE CANVAS ── */
    #wormCanvas {
      position: fixed;
      inset: 0;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #wormCanvas.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── WHITE FLASH ── */
    #flash {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    /* ── AUDIO PLAYER ── */
    #player {
      position: fixed;
      bottom: clamp(18px, 4vw, 32px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 100px;
      padding: 10px 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      white-space: nowrap;
      max-width: 90vw;
    }
    #player.visible { opacity:1; pointer-events:all; }

    #playBtn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg,#a855f7,#6366f1);
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    #playBtn:active { transform:scale(0.93); }

    .player-label {
      font-size: 0.78rem;
      color: rgba(215,195,255,0.78);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    #progressBar {
      width: clamp(70px, 18vw, 130px);
      height: 3px;
      background: rgba(255,255,255,0.14);
      border-radius: 10px;
      overflow: hidden;
    }
    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right,#a855f7,#60a5fa);
      border-radius: 10px;
      transition: width 0.4s linear;
    }

    audio { display:none; }
  </style>
</head>
<body>

  <canvas id="starCanvas"></canvas>

  <div id="hero">
    <div class="glass-card">
      <span class="emoji-glow"></span>
      <p class="eyebrow">to my verniceeee</p>
      <h1 class="main-title">Happy 16<br>Monthsary</h1>
      <p class="tagline">every moment with you is my favorite</p>
      <div class="divider">
        <div class="divider-line"></div>
        <span style="font-size:.85rem"></span>
        <div class="divider-line"></div>
      </div>
      <p class="message">
        16 months of <strong>loving you</strong>, staying up with you,
        and loving every bit of you forever and ever. you are my princess,
        my world, my <strong>baby vernice</strong>.
      </p>
      <div class="day-badge"><span id="dayCount">...</span> days together</div>
      <p class="click-hint">tap anywhere to continue</p>
    </div>
  </div>

  <canvas id="wormCanvas"></canvas>
  <div id="flash"></div>

  <div id="player">
    <button id="playBtn">▶</button>
    <span class="player-label">our song 🎵</span>
    <div id="progressBar"><div id="progressFill"></div></div>
  </div>

  <!--
    ✏️  HOW TO ADD YOUR SONG:
    1. Rename your audio file to  song.mp3
    2. Put it in the same folder as index.html
    3. Push both files to GitHub — done!
    Supported formats: .mp3  .ogg  .wav
  -->
  <audio id="song" src="Miraidempa - Unslept.mp3" preload="auto"></audio>


  <script>
  (() => {
    /* ─── CONFIG ───────────────────────────────── */
    const START_DATE      = new Date('2023-12-01'); // ← change to your start date
    const WORM_DURATION   = 5000;                   // wormhole length in ms

    /* ─── DAYS COUNTER ─────────────────────────── */
    const days = Math.floor((Date.now() - START_DATE) / 86400000);
    document.getElementById('dayCount').textContent = days.toLocaleString();

    /* ─── STAR BACKGROUND ──────────────────────── */
    const SC   = document.getElementById('starCanvas');
    const sCtx = SC.getContext('2d');
    let stars  = [];

    function resizeSC() {
      SC.width  = window.innerWidth;
      SC.height = window.innerHeight;
      buildStars();
    }

    function buildStars() {
      stars = [];
      const n = Math.floor(SC.width * SC.height / 3800);
      for (let i = 0; i < n; i++) {
        stars.push({
          x:     Math.random() * SC.width,
          y:     Math.random() * SC.height,
          r:     Math.random() * 1.4 + 0.2,
          base:  Math.random() * 0.5 + 0.15,
          spd:   Math.random() * 0.004 + 0.001,
          phase: Math.random() * Math.PI * 2,
          blue:  Math.random() > 0.82,
        });
      }
    }

    function drawStars(t) {
      sCtx.clearRect(0, 0, SC.width, SC.height);

      // Deep-space background
      const bg = sCtx.createRadialGradient(
        SC.width*.5, SC.height*.4, 0,
        SC.width*.5, SC.height*.5, SC.width*.9
      );
      bg.addColorStop(0, '#08001a');
      bg.addColorStop(.5,'#03000e');
      bg.addColorStop(1, '#000003');
      sCtx.fillStyle = bg;
      sCtx.fillRect(0, 0, SC.width, SC.height);

      // Faint nebula glow
      [[.2,.3, '80,20,130', .13],[.78,.68,'20,40,100',.1]].forEach(([nx,ny,col,op]) => {
        const g = sCtx.createRadialGradient(
          SC.width*nx, SC.height*ny, 0,
          SC.width*nx, SC.height*ny, SC.width*.32
        );
        g.addColorStop(0, `rgba(${col},${op})`);
        g.addColorStop(1, 'transparent');
        sCtx.fillStyle = g;
        sCtx.fillRect(0, 0, SC.width, SC.height);
      });

      // Stars
      for (const s of stars) {
        const a = s.base + .28*Math.sin(t*s.spd + s.phase);
        sCtx.beginPath();
        sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        sCtx.fillStyle = s.blue
          ? `rgba(180,200,255,${a})`
          : `rgba(255,255,255,${a})`;
        sCtx.fill();
      }
    }

    /* ─── WORMHOLE ──────────────────────────────── */
    const WC    = document.getElementById('wormCanvas');
    const wCtx  = WC.getContext('2d');
    const flash = document.getElementById('flash');
    const hero  = document.getElementById('hero');
    const player      = document.getElementById('player');
    const song        = document.getElementById('song');
    const playBtn     = document.getElementById('playBtn');
    const progressFill= document.getElementById('progressFill');

    let wormRunning = false;
    let wormStart   = null;
    let particles   = [];

    function resizeWC() {
      WC.width  = window.innerWidth;
      WC.height = window.innerHeight;
    }

    class Particle {
      constructor(rand) {
        this.reset(rand);
      }
      reset(rand) {
        const cx = WC.width/2, cy = WC.height/2;
        this.cx    = cx; this.cy = cy;
        this.angle = Math.random() * Math.PI*2;
        this.dist  = rand ? Math.random() * Math.hypot(cx,cy) : Math.random()*35;
        this.spd   = Math.random()*2.5 + 0.8;
        this.size  = Math.random()*1.6 + 0.3;
        this.hue   = Math.random()>.5 ? 195+Math.random()*55 : 255+Math.random()*50;
        this.alpha = Math.random()*0.55+0.3;
        this.maxD  = Math.hypot(cx,cy)*1.45;
      }
      update(sm) {
        this.dist += this.spd * sm;
        if (this.dist > this.maxD) this.reset(false);
      }
      draw(ctx, sm) {
        const x   = this.cx + Math.cos(this.angle)*this.dist;
        const y   = this.cy + Math.sin(this.angle)*this.dist;
        const tl  = Math.max(2, this.spd*sm*9);
        const x2  = this.cx + Math.cos(this.angle)*(this.dist-tl);
        const y2  = this.cy + Math.sin(this.angle)*(this.dist-tl);
        const g   = ctx.createLinearGradient(x2,y2,x,y);
        g.addColorStop(0, `hsla(${this.hue},100%,82%,0)`);
        g.addColorStop(1, `hsla(${this.hue},100%,92%,${this.alpha})`);
        ctx.beginPath();
        ctx.moveTo(x2,y2);
        ctx.lineTo(x,y);
        ctx.strokeStyle = g;
        ctx.lineWidth   = this.size;
        ctx.lineCap     = 'round';
        ctx.stroke();
      }
    }

    function drawWorm(ts) {
      if (!wormStart) wormStart = ts;
      const elapsed  = ts - wormStart;
      const progress = Math.min(elapsed / WORM_DURATION, 1);
      const sm       = 1 + progress * 20; // speed multiplier

      const W=WC.width, H=WC.height, cx=W/2, cy=H/2;

      // Motion-blur fill
      wCtx.fillStyle = 'rgba(0,0,8,0.32)';
      wCtx.fillRect(0,0,W,H);

      // Tunnel radial gradient
      const tg = wCtx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.8);
      tg.addColorStop(0,   `rgba(70,15,170,${.12+progress*.32})`);
      tg.addColorStop(.38, `rgba(15,8,70,${.18+progress*.18})`);
      tg.addColorStop(1,   'rgba(0,0,0,0)');
      wCtx.fillStyle = tg;
      wCtx.fillRect(0,0,W,H);

      // Oval rings expanding toward viewer
      for (let i=0; i<12; i++) {
        const phase = ((progress*2.6 + i/12) % 1);
        const rx    = phase * Math.max(cx,cy) * 1.65;
        const ry    = rx * 0.27;
        const alpha = Math.sin(phase*Math.PI) * 0.7;
        const hue   = 205 + i*9;
        const rot   = ts*0.0003 + i*0.38;
        wCtx.save();
        wCtx.translate(cx,cy);
        wCtx.rotate(rot);
        wCtx.beginPath();
        wCtx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
        wCtx.strokeStyle = `hsla(${hue},100%,68%,${alpha})`;
        wCtx.lineWidth   = 1.1 + (1-phase)*2.2;
        wCtx.stroke();
        wCtx.restore();
      }

      // Star-streak particles
      wCtx.save();
      for (const p of particles) { p.update(sm); p.draw(wCtx,sm); }
      wCtx.restore();

      // Centre glow
      const pulse = .5+.5*Math.sin(ts*.007);
      const gr    = (18+pulse*14) * (1+progress*3.2);
      const gg    = wCtx.createRadialGradient(cx,cy,0,cx,cy,gr);
      gg.addColorStop(0,   `rgba(255,255,255,${.92-progress*.35})`);
      gg.addColorStop(.28, 'rgba(190,150,255,.55)');
      gg.addColorStop(.65, 'rgba(90,70,255,.18)');
      gg.addColorStop(1,   'rgba(0,0,0,0)');
      wCtx.beginPath();
      wCtx.arc(cx,cy,gr,0,Math.PI*2);
      wCtx.fillStyle = gg;
      wCtx.fill();

      // Flash-to-white in last 12%
      if (progress > 0.88) {
        const fa = (progress - 0.88) / 0.12;
        wCtx.fillStyle = `rgba(255,255,255,${fa*.96})`;
        wCtx.fillRect(0,0,W,H);
      }

      if (progress < 1) {
        requestAnimationFrame(drawWorm);
      } else {
        endWorm();
      }
    }

    function endWorm() {
      flash.style.transition = 'opacity 0s';
      flash.style.opacity    = '1';
      wCtx.clearRect(0,0,WC.width,WC.height);
      WC.classList.remove('active');

      setTimeout(() => {
        flash.style.transition = 'opacity 1s ease';
        flash.style.opacity    = '0';
        hero.style.opacity     = '1';
        player.classList.add('visible');
        song.play().catch(()=>{});
        wormRunning = false;
      }, 80);
    }

    function startWorm() {
      if (wormRunning) return;
      wormRunning = true;
      wormStart   = null;
      resizeWC();
      particles = Array.from({length:280}, (_,i) => new Particle(true));
      hero.style.opacity = '0';
      WC.classList.add('active');
      requestAnimationFrame(drawWorm);
    }

    /* ─── AUDIO CONTROLS ────────────────────────── */
    let isPlaying = false;
    playBtn.addEventListener('click', e => {
      e.stopPropagation();
      isPlaying ? (song.pause(), playBtn.textContent='▶')
                : (song.play(),  playBtn.textContent='⏸');
      isPlaying = !isPlaying;
    });
    song.addEventListener('play',  () => { isPlaying=true;  playBtn.textContent='⏸'; });
    song.addEventListener('pause', () => { isPlaying=false; playBtn.textContent='▶'; });
    song.addEventListener('timeupdate', () => {
      if (song.duration)
        progressFill.style.width = (song.currentTime/song.duration*100)+'%';
    });

    /* ─── CLICK / TAP TO START ──────────────────── */
    document.body.addEventListener('click', () => {
      if (!wormRunning && !player.classList.contains('visible')) startWorm();
    });

    /* ─── MAIN LOOP (stars) ─────────────────────── */
    function loop(t) { drawStars(t); requestAnimationFrame(loop); }

    /* ─── INIT ──────────────────────────────────── */
    resizeSC(); resizeWC();
    window.addEventListener('resize', () => { resizeSC(); resizeWC(); });
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
