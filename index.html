<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Happy 16 Monthsary 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Nunito:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#000;
      font-family:'Nunito', sans-serif;
      color:#fff;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    /* ══ STAR CANVAS ══ */
    #starCanvas { position:fixed; inset:0; z-index:0; }

    /* ══ HERO ══ */
    #hero {
      position:fixed; inset:0; z-index:2;
      display:flex; align-items:center; justify-content:center;
      padding:clamp(16px,4vw,32px);
      transition:opacity .5s ease;
      cursor:pointer;
    }
    .glass-card {
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      border-radius:clamp(18px,5vw,34px);
      padding:clamp(30px,7vw,56px) clamp(26px,7vw,64px);
      max-width:min(540px,92vw); width:100%;
      text-align:center;
      box-shadow:0 0 50px rgba(140,80,255,.2),0 0 100px rgba(60,100,255,.1),inset 0 1px 0 rgba(255,255,255,.1);
      animation:cardIn 1.2s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from{opacity:0;transform:translateY(28px) scale(.97)}
      to  {opacity:1;transform:translateY(0) scale(1)}
    }
    .emoji-glow {
      font-size:clamp(1.9rem,6vw,2.8rem); display:block; margin-bottom:10px;
      animation:hpulse 2.8s ease-in-out infinite;
      filter:drop-shadow(0 0 10px rgba(240,150,210,.7));
    }
    @keyframes hpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.14)} }
    .eyebrow {
      font-size:clamp(.6rem,1.8vw,.75rem); font-weight:300;
      letter-spacing:.28em; text-transform:uppercase;
      color:rgba(190,150,255,.65); margin-bottom:7px;
      animation:fadeUp 1s .3s both;
    }
    .main-title {
      font-family:'Abril Fatface',cursive;
      font-size:clamp(2.4rem,8.5vw,4.1rem); line-height:1.08;
      background:linear-gradient(135deg,#fff 0%,#dbb8ff 40%,#80b8ff 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:9px; animation:fadeUp 1s .45s both;
    }
    .tagline {
      font-size:clamp(.85rem,2.4vw,1.05rem); font-style:italic; font-weight:300;
      color:rgba(215,195,255,.72); margin-bottom:20px; animation:fadeUp 1s .6s both;
    }
    .divider { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:18px; animation:fadeUp 1s .7s both; }
    .divider-line { flex:1; max-width:65px; height:1px; background:linear-gradient(to right,transparent,rgba(170,130,255,.4)); }
    .divider-line:last-child { background:linear-gradient(to left,transparent,rgba(170,130,255,.4)); }
    .message { font-size:clamp(.85rem,2.2vw,.98rem); font-weight:300; line-height:1.85; color:rgba(222,210,255,.76); animation:fadeUp 1s .85s both; }
    .message strong { font-weight:600; color:#ccaaff; }
    .day-badge {
      display:inline-flex; align-items:center; gap:6px; margin-top:20px;
      padding:8px 18px; background:rgba(130,70,255,.14);
      border:1px solid rgba(170,110,255,.28); border-radius:100px;
      font-size:clamp(.72rem,1.9vw,.82rem); font-weight:600; color:#bfa0ff;
      animation:fadeUp 1s 1s both;
    }
    .click-hint {
      margin-top:22px; font-size:clamp(.65rem,1.8vw,.76rem);
      letter-spacing:.14em; text-transform:uppercase;
      color:rgba(255,255,255,.28);
      animation:fadeUp 1s 1.3s both, breathe 3s 2.3s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{opacity:.28} 50%{opacity:.65} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(13px)} to{opacity:1;transform:translateY(0)} }

    /* ══ WORMHOLE CANVAS ══ */
    #wormCanvas { position:fixed; inset:0; z-index:10; opacity:0; pointer-events:none; transition:opacity .4s ease; }
    #wormCanvas.active { opacity:1; pointer-events:all; }

    /* ══ FLASH ══ */
    #flash { position:fixed; inset:0; z-index:20; background:#fff; opacity:0; pointer-events:none; }

    /* ══ SOLAR SYSTEM WRAP ══ */
    #solarWrap {
      position:fixed; inset:0; z-index:3;
      overflow:hidden;
      opacity:0; pointer-events:none;
      transition:opacity .8s ease;
    }
    #solarWrap.visible { opacity:1; pointer-events:all; }

    /* The large draggable universe */
    #universe {
      position:absolute;
      width:3000px; height:3000px;
      left:50%; top:50%;
      margin-left:-1500px; margin-top:-1500px;
      will-change:transform;
      cursor:grab;
    }
    #universe.dragging { cursor:grabbing; }

    /* Orbit rings */
    .orbit-ring {
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.07);
      pointer-events:none;
      transform-origin:center center;
    }

    /* Central star */
    #centralStar {
      position:absolute;
      left:1500px; top:1500px;
      transform:translate(-50%,-50%);
      width:72px; height:72px;
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:2rem;
      background:radial-gradient(circle,rgba(255,220,180,.25),rgba(255,150,100,.1) 60%,transparent);
      box-shadow:0 0 30px rgba(255,180,80,.35),0 0 80px rgba(255,120,60,.15);
      animation:starPulse 3s ease-in-out infinite;
      pointer-events:none;
      z-index:2;
    }
    @keyframes starPulse {
      0%,100%{box-shadow:0 0 30px rgba(255,180,80,.35),0 0 80px rgba(255,120,60,.15)}
      50%    {box-shadow:0 0 50px rgba(255,200,100,.55),0 0 120px rgba(255,140,80,.25)}
    }

    /* Planet wrapper (positioned by JS) */
    .planet-wrap {
      position:absolute;
      display:flex; flex-direction:column; align-items:center; gap:5px;
      transform:translate(-50%,-50%);
      cursor:pointer;
      z-index:5;
    }
    .planet-orb {
      width:clamp(46px,8vw,58px); height:clamp(46px,8vw,58px);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(1.3rem,3vw,1.6rem);
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      transition:transform .2s ease, box-shadow .2s ease;
      will-change:transform;
    }
    .planet-wrap:hover .planet-orb,
    .planet-wrap:active .planet-orb {
      transform:scale(1.18);
    }
    .planet-label {
      font-size:.62rem; letter-spacing:.1em; text-transform:uppercase;
      color:rgba(255,255,255,.55); white-space:nowrap;
    }

    /* Drag hint */
    #dragHint {
      position:fixed; bottom:clamp(18px,4vw,28px); left:50%;
      transform:translateX(-50%);
      z-index:4;
      font-size:.72rem; letter-spacing:.14em; text-transform:uppercase;
      color:rgba(255,255,255,.35);
      pointer-events:none;
      transition:opacity .6s ease;
    }

    /* ══ AUDIO PLAYER ══ */
    #player {
      position:fixed; bottom:clamp(18px,4vw,32px); left:50%;
      transform:translateX(-50%);
      z-index:6;
      display:flex; align-items:center; gap:12px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-radius:100px; padding:10px 20px;
      opacity:0; pointer-events:none;
      transition:opacity .8s ease;
      white-space:nowrap; max-width:90vw;
    }
    #player.visible { opacity:1; pointer-events:all; }
    #playBtn {
      width:34px; height:34px; border-radius:50%; border:none;
      background:linear-gradient(135deg,#a855f7,#6366f1);
      color:#fff; font-size:.9rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:transform .15s;
    }
    #playBtn:active { transform:scale(.93); }
    .player-label { font-size:.78rem; color:rgba(215,195,255,.78); font-weight:300; letter-spacing:.05em; }
    #progressBar { width:clamp(70px,18vw,130px); height:3px; background:rgba(255,255,255,.14); border-radius:10px; overflow:hidden; }
    #progressFill { height:100%; width:0%; background:linear-gradient(to right,#a855f7,#60a5fa); border-radius:10px; transition:width .4s linear; }

    /* ══ MODAL ══ */
    #modal {
      position:fixed; inset:0; z-index:30;
      display:flex; align-items:center; justify-content:center;
      padding:20px;
      background:rgba(0,0,15,.65);
      backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
      opacity:0; pointer-events:none;
      transition:opacity .3s ease;
    }
    #modal.open { opacity:1; pointer-events:all; }
    #modalCard {
      background:linear-gradient(145deg,rgba(20,8,40,.95),rgba(8,3,20,.97));
      border:1px solid rgba(255,255,255,.14);
      border-radius:clamp(18px,4vw,28px);
      padding:clamp(28px,6vw,44px) clamp(24px,6vw,40px);
      max-width:min(460px,92vw); width:100%;
      max-height:85vh; overflow-y:auto;
      position:relative;
      transform:translateY(22px) scale(.97);
      transition:transform .35s cubic-bezier(.22,1,.36,1);
    }
    #modal.open #modalCard { transform:translateY(0) scale(1); }
    #modalClose {
      position:absolute; top:16px; right:16px;
      width:30px; height:30px; border-radius:50%; border:none;
      background:rgba(255,255,255,.1); color:rgba(255,255,255,.7);
      font-size:.9rem; cursor:pointer; display:flex;
      align-items:center; justify-content:center;
      transition:background .2s;
    }
    #modalClose:hover { background:rgba(255,255,255,.18); }
    .modal-planet-icon { font-size:2.2rem; display:block; margin-bottom:10px; }
    .modal-title {
      font-family:'Abril Fatface',cursive;
      font-size:clamp(1.5rem,4vw,2rem);
      background:linear-gradient(135deg,#fff,#dbb8ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:16px;
    }
    .modal-body {
      font-size:clamp(.88rem,2.2vw,.98rem);
      font-weight:300; line-height:1.9;
      color:rgba(222,210,255,.82);
    }
    .modal-body strong { font-weight:600; color:#ccaaff; }
    .modal-body p + p { margin-top:12px; }
    .modal-list { list-style:none; margin-top:4px; }
    .modal-list li {
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,.07);
      display:flex; align-items:baseline; gap:8px;
      font-size:clamp(.86rem,2.2vw,.96rem);
      color:rgba(222,210,255,.8);
    }
    .modal-list li:last-child { border-bottom:none; }
    .modal-list li::before { content:'✦'; color:#a78bfa; font-size:.7rem; flex-shrink:0; }
    .coming-tag {
      display:inline-block; margin-top:18px;
      padding:7px 16px; border-radius:100px;
      border:1px dashed rgba(255,255,255,.2);
      font-size:.72rem; letter-spacing:.1em; text-transform:uppercase;
      color:rgba(255,255,255,.3);
    }

    audio { display:none; }
  </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<!-- ── HERO ── -->
<div id="hero">
  <div class="glass-card">
    <span class="emoji-glow">💕</span>
    <p class="eyebrow">to my favorite person</p>
    <h1 class="main-title">Happy 16<br>Monthsary</h1>
    <p class="tagline">every moment with you is my favorite ✨</p>
    <div class="divider">
      <div class="divider-line"></div>
      <span style="font-size:.85rem">🌙</span>
      <div class="divider-line"></div>
    </div>
    <p class="message">
      Sixteen months of <strong>laughter</strong>, late nights,
      and loving every side of you. You are my home,
      my adventure, my <strong>everything</strong>.
    </p>
    <div class="day-badge">✨ <span id="dayCount">...</span> days together</div>
    <p class="click-hint">✦ tap anywhere to continue ✦</p>
  </div>
</div>

<!-- ── WORMHOLE ── -->
<canvas id="wormCanvas"></canvas>
<div id="flash"></div>

<!-- ── SOLAR SYSTEM ── -->
<div id="solarWrap">
  <div id="universe">
    <div id="centralStar">🌟</div>
  </div>
  <div id="dragHint">✦ drag to explore ✦</div>
</div>

<!-- ── AUDIO PLAYER ── -->
<div id="player">
  <button id="playBtn">▶</button>
  <span class="player-label">our song 🎵</span>
  <div id="progressBar"><div id="progressFill"></div></div>
</div>

<!-- ── MODAL ── -->
<div id="modal">
  <div id="modalCard">
    <button id="modalClose">✕</button>
    <span id="mIcon" class="modal-planet-icon"></span>
    <h2 id="mTitle" class="modal-title"></h2>
    <div id="mBody" class="modal-body"></div>
  </div>
</div>

<!--
  ✏️  Add your audio file:
  1. Rename it to  song.mp3
  2. Place it in the same folder as index.html
  3. Push both to GitHub
-->
<audio id="song" src="song.mp3" preload="auto"></audio>

<script>
(() => {
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     CONFIG  — edit these
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const START_DATE    = new Date('2023-12-01'); // ← your anniversary start date
  const WORM_DURATION = 5000;

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     PLANET DATA  — edit content here
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const PLANETS = [
    {
      id: 1, emoji: '💌', label: 'Letter',
      radius: 145, period: 13000, startAngle: 0.5, tiltY: 0.38,
      glow: 'rgba(249,168,212,.55)',
      title: 'A Letter For You',
      /* ✏️ Edit the letter below */
      body: `
        <p>Hi love,</p>
        <p>I wrote this because some things are too big to just say out loud.</p>
        <p>Every day with you is a <strong>gift</strong> I didn't know I needed.
        You make the ordinary feel extraordinary, and you make hard days softer
        just by being there.</p>
        <p>Thank you for choosing me, every single day.
        Happy 16 months — here's to every one that follows. 💕</p>
      `
    },
    {
      id: 2, emoji: '🎵', label: 'Our Song',
      radius: 230, period: 20000, startAngle: 2.2, tiltY: 0.35,
      glow: 'rgba(167,139,250,.55)',
      title: 'Our Song',
      /* ✏️ Edit the song name/meaning */
      body: `
        <p>This song reminds me of <strong>us</strong> — the late nights,
        the quiet moments, every time it came on and I thought of you.</p>
        <p>Whenever you hear it, know that I'm thinking of you. 🎶</p>
        <div style="margin-top:20px; text-align:center;">
          <button onclick="document.getElementById('song').paused
            ? (document.getElementById('song').play(), this.textContent='⏸  pause')
            : (document.getElementById('song').pause(), this.textContent='▶  play')"
            style="padding:10px 28px; border-radius:100px; border:1px solid rgba(167,139,250,.5);
            background:rgba(167,139,250,.15); color:#c4b5fd; font-family:inherit;
            font-size:.9rem; cursor:pointer; letter-spacing:.05em;">
            ▶&nbsp; play
          </button>
        </div>
      `
    },
    {
      id: 3, emoji: '🌸', label: 'Reasons',
      radius: 315, period: 30000, startAngle: 3.9, tiltY: 0.32,
      glow: 'rgba(134,239,172,.5)',
      title: 'Why I Love You',
      /* ✏️ Add your own reasons */
      body: `
        <ul class="modal-list">
          <li>The way you laugh at your own jokes before the punchline</li>
          <li>How you make everywhere feel like home</li>
          <li>Your kindness — you give it so freely</li>
          <li>The way you look when you're focused on something</li>
          <li>That you always know exactly what I need to hear</li>
          <li>Everything you don't even realize you do 💕</li>
        </ul>
      `
    },
    {
      id: 4, emoji: '📸', label: 'Memories',
      radius: 400, period: 40000, startAngle: 1.3, tiltY: 0.28,
      glow: 'rgba(253,211,77,.45)',
      title: 'Our Memories',
      /* ✏️ Add photos or memories here */
      body: `
        <p>Every moment with you is one I want to keep forever.</p>
        <p>More photos and memories coming here soon — our story,
        <strong>in pictures</strong>. 🌙</p>
        <div style="text-align:center"><span class="coming-tag">📸 photos coming soon</span></div>
      `
    },
  ];

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     DAYS COUNTER
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const days = Math.floor((Date.now() - START_DATE) / 86400000);
  document.getElementById('dayCount').textContent = days.toLocaleString();

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     STAR BACKGROUND
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const SC   = document.getElementById('starCanvas');
  const sCtx = SC.getContext('2d');
  let stars  = [];

  function resizeSC() { SC.width=innerWidth; SC.height=innerHeight; buildStars(); }

  function buildStars() {
    stars=[];
    const n = Math.floor(SC.width*SC.height/3800);
    for(let i=0;i<n;i++) stars.push({
      x:Math.random()*SC.width, y:Math.random()*SC.height,
      r:Math.random()*1.4+.2, base:Math.random()*.5+.15,
      spd:Math.random()*.004+.001, phase:Math.random()*Math.PI*2,
      blue:Math.random()>.82
    });
  }

  function drawStars(t) {
    sCtx.clearRect(0,0,SC.width,SC.height);
    const bg=sCtx.createRadialGradient(SC.width*.5,SC.height*.4,0,SC.width*.5,SC.height*.5,SC.width*.9);
    bg.addColorStop(0,'#08001a'); bg.addColorStop(.5,'#03000e'); bg.addColorStop(1,'#000003');
    sCtx.fillStyle=bg; sCtx.fillRect(0,0,SC.width,SC.height);
    [[.2,.3,'80,20,130',.13],[.78,.68,'20,40,100',.1]].forEach(([nx,ny,c,o])=>{
      const g=sCtx.createRadialGradient(SC.width*nx,SC.height*ny,0,SC.width*nx,SC.height*ny,SC.width*.32);
      g.addColorStop(0,`rgba(${c},${o})`); g.addColorStop(1,'transparent');
      sCtx.fillStyle=g; sCtx.fillRect(0,0,SC.width,SC.height);
    });
    for(const s of stars){
      const a=s.base+.28*Math.sin(t*s.spd+s.phase);
      sCtx.beginPath(); sCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
      sCtx.fillStyle=s.blue?`rgba(180,200,255,${a})`:`rgba(255,255,255,${a})`;
      sCtx.fill();
    }
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     WORMHOLE
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const WC=document.getElementById('wormCanvas');
  const wCtx=WC.getContext('2d');
  const flash=document.getElementById('flash');
  const hero=document.getElementById('hero');
  let wormRunning=false, wormStart=null, wParticles=[];

  function resizeWC(){ WC.width=innerWidth; WC.height=innerHeight; }

  class WP {
    constructor(rand){this.reset(rand);}
    reset(rand){
      const cx=WC.width/2,cy=WC.height/2;
      this.cx=cx; this.cy=cy;
      this.angle=Math.random()*Math.PI*2;
      this.dist=rand?Math.random()*Math.hypot(cx,cy):Math.random()*35;
      this.spd=Math.random()*2.5+.8;
      this.size=Math.random()*1.6+.3;
      this.hue=Math.random()>.5?195+Math.random()*55:255+Math.random()*50;
      this.alpha=Math.random()*.55+.3;
      this.maxD=Math.hypot(cx,cy)*1.45;
    }
    update(sm){ this.dist+=this.spd*sm; if(this.dist>this.maxD) this.reset(false); }
    draw(ctx,sm){
      const x=this.cx+Math.cos(this.angle)*this.dist;
      const y=this.cy+Math.sin(this.angle)*this.dist;
      const tl=Math.max(2,this.spd*sm*9);
      const x2=this.cx+Math.cos(this.angle)*(this.dist-tl);
      const y2=this.cy+Math.sin(this.angle)*(this.dist-tl);
      const g=ctx.createLinearGradient(x2,y2,x,y);
      g.addColorStop(0,`hsla(${this.hue},100%,82%,0)`);
      g.addColorStop(1,`hsla(${this.hue},100%,92%,${this.alpha})`);
      ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x,y);
      ctx.strokeStyle=g; ctx.lineWidth=this.size; ctx.lineCap='round'; ctx.stroke();
    }
  }

  function drawWorm(ts){
    if(!wormStart) wormStart=ts;
    const progress=Math.min((ts-wormStart)/WORM_DURATION,1);
    const sm=1+progress*20;
    const W=WC.width,H=WC.height,cx=W/2,cy=H/2;
    wCtx.fillStyle='rgba(0,0,8,.32)'; wCtx.fillRect(0,0,W,H);
    const tg=wCtx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.8);
    tg.addColorStop(0,`rgba(70,15,170,${.12+progress*.32})`);
    tg.addColorStop(.38,`rgba(15,8,70,${.18+progress*.18})`);
    tg.addColorStop(1,'rgba(0,0,0,0)');
    wCtx.fillStyle=tg; wCtx.fillRect(0,0,W,H);
    for(let i=0;i<12;i++){
      const phase=((progress*2.6+i/12)%1);
      const rx=phase*Math.max(cx,cy)*1.65, ry=rx*.27;
      const alpha=Math.sin(phase*Math.PI)*.7;
      wCtx.save(); wCtx.translate(cx,cy); wCtx.rotate(ts*.0003+i*.38);
      wCtx.beginPath(); wCtx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
      wCtx.strokeStyle=`hsla(${205+i*9},100%,68%,${alpha})`;
      wCtx.lineWidth=1.1+(1-phase)*2.2; wCtx.stroke(); wCtx.restore();
    }
    wCtx.save();
    for(const p of wParticles){ p.update(sm); p.draw(wCtx,sm); }
    wCtx.restore();
    const pulse=.5+.5*Math.sin(ts*.007);
    const gr=(18+pulse*14)*(1+progress*3.2);
    const gg=wCtx.createRadialGradient(cx,cy,0,cx,cy,gr);
    gg.addColorStop(0,`rgba(255,255,255,${.92-progress*.35})`);
    gg.addColorStop(.28,'rgba(190,150,255,.55)');
    gg.addColorStop(.65,'rgba(90,70,255,.18)');
    gg.addColorStop(1,'rgba(0,0,0,0)');
    wCtx.beginPath(); wCtx.arc(cx,cy,gr,0,Math.PI*2);
    wCtx.fillStyle=gg; wCtx.fill();
    if(progress>.88){
      wCtx.fillStyle=`rgba(255,255,255,${((progress-.88)/.12)*.96})`;
      wCtx.fillRect(0,0,W,H);
    }
    if(progress<1) requestAnimationFrame(drawWorm);
    else endWorm();
  }

  function endWorm(){
    flash.style.transition='opacity 0s'; flash.style.opacity='1';
    wCtx.clearRect(0,0,WC.width,WC.height); WC.classList.remove('active');
    setTimeout(()=>{
      flash.style.transition='opacity 1s ease'; flash.style.opacity='0';
      showSolar();
      document.getElementById('player').classList.add('visible');
      document.getElementById('song').play().catch(()=>{});
      wormRunning=false;
    },80);
  }

  function startWorm(){
    if(wormRunning) return;
    wormRunning=true; wormStart=null;
    resizeWC();
    wParticles=Array.from({length:280},()=>new WP(true));
    hero.style.opacity='0';
    WC.classList.add('active');
    requestAnimationFrame(drawWorm);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     SOLAR SYSTEM
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const solarWrap = document.getElementById('solarWrap');
  const universe  = document.getElementById('universe');
  const dragHint  = document.getElementById('dragHint');
  let planetEls   = [];
  let solarRAF    = null;

  function buildSolar(){
    // Orbit rings
    PLANETS.forEach(p=>{
      const ring=document.createElement('div');
      ring.className='orbit-ring';
      const rx=p.radius, ry=p.radius*p.tiltY;
      ring.style.cssText=`
        width:${rx*2}px; height:${ry*2}px;
        left:${1500-rx}px; top:${1500-ry}px;
      `;
      universe.appendChild(ring);
    });

    // Planet elements
    planetEls=PLANETS.map(p=>{
      const wrap=document.createElement('div');
      wrap.className='planet-wrap';
      wrap.innerHTML=`
        <div class="planet-orb" style="box-shadow:0 0 22px ${p.glow},0 0 50px ${p.glow.replace('.55','0.2').replace('.5','0.18').replace('.45','0.15')}">${p.emoji}</div>
        <span class="planet-label">${p.label}</span>
      `;
      wrap.addEventListener('click', e=>{ e.stopPropagation(); if(!hasDragged) openModal(p); });
      universe.appendChild(wrap);
      return {el:wrap, data:p};
    });
  }

  function animateSolar(ts){
    planetEls.forEach(({el,data:p})=>{
      const angle=p.startAngle+(ts/p.period)*Math.PI*2;
      const x=1500+Math.cos(angle)*p.radius;
      const y=1500+Math.sin(angle)*p.radius*p.tiltY;
      el.style.left=x+'px';
      el.style.top =y+'px';
      // Depth: planets below center are in front
      el.style.zIndex=Math.round(y);
    });
    solarRAF=requestAnimationFrame(animateSolar);
  }

  function showSolar(){
    buildSolar();
    solarWrap.classList.add('visible');
    solarRAF=requestAnimationFrame(animateSolar);
    // Fade drag hint after 4s
    setTimeout(()=>{ dragHint.style.opacity='0'; }, 4000);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     DRAG HANDLING
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let dragX=0, dragY=0, startX=0, startY=0;
  let isDragging=false, hasDragged=false;
  const MAX_DRAG=500;

  function clamp(v,min,max){ return Math.min(Math.max(v,min),max); }
  function applyDrag(){ universe.style.transform=`translate(${dragX}px,${dragY}px)`; }

  function onDragStart(x,y){
    isDragging=true; hasDragged=false;
    startX=x-dragX; startY=y-dragY;
    universe.classList.add('dragging');
  }
  function onDragMove(x,y){
    if(!isDragging) return;
    const nx=clamp(x-startX,-MAX_DRAG,MAX_DRAG);
    const ny=clamp(y-startY,-MAX_DRAG,MAX_DRAG);
    if(Math.abs(nx-dragX)>3||Math.abs(ny-dragY)>3) hasDragged=true;
    dragX=nx; dragY=ny;
    applyDrag();
  }
  function onDragEnd(){ isDragging=false; universe.classList.remove('dragging'); }

  // Mouse
  universe.addEventListener('mousedown', e=>onDragStart(e.clientX,e.clientY));
  window.addEventListener('mousemove',   e=>onDragMove(e.clientX,e.clientY));
  window.addEventListener('mouseup',     ()=>onDragEnd());

  // Touch
  universe.addEventListener('touchstart', e=>{ const t=e.touches[0]; onDragStart(t.clientX,t.clientY); },{passive:true});
  universe.addEventListener('touchmove',  e=>{ e.preventDefault(); const t=e.touches[0]; onDragMove(t.clientX,t.clientY); },{passive:false});
  universe.addEventListener('touchend',   ()=>onDragEnd());

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     MODAL
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const modal      = document.getElementById('modal');
  const modalClose = document.getElementById('modalClose');

  function openModal(p){
    document.getElementById('mIcon').textContent  = p.emoji;
    document.getElementById('mTitle').textContent = p.title;
    document.getElementById('mBody').innerHTML    = p.body;
    modal.classList.add('open');
  }
  function closeModal(){ modal.classList.remove('open'); }

  modalClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e=>{ if(e.target===modal) closeModal(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     AUDIO PLAYER
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const song=document.getElementById('song');
  const playBtn=document.getElementById('playBtn');
  const progressFill=document.getElementById('progressFill');
  let isPlaying=false;

  playBtn.addEventListener('click',e=>{
    e.stopPropagation();
    isPlaying?(song.pause(),playBtn.textContent='▶'):(song.play(),playBtn.textContent='⏸');
    isPlaying=!isPlaying;
  });
  song.addEventListener('play', ()=>{isPlaying=true;  playBtn.textContent='⏸';});
  song.addEventListener('pause',()=>{isPlaying=false; playBtn.textContent='▶';});
  song.addEventListener('timeupdate',()=>{ if(song.duration) progressFill.style.width=(song.currentTime/song.duration*100)+'%'; });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     HERO CLICK → WORMHOLE
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  hero.addEventListener('click',()=>{
    if(!wormRunning&&!solarWrap.classList.contains('visible')){
      song.play().then(()=>song.pause()).catch(()=>{});
      startWorm();
    }
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     MAIN LOOP + INIT
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function loop(t){ drawStars(t); requestAnimationFrame(loop); }

  resizeSC(); resizeWC();
  window.addEventListener('resize',()=>{ resizeSC(); resizeWC(); });
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
